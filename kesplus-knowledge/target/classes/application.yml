﻿server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: kesplus-knowledge-base

  datasource:
    url: jdbc:postgresql://152.136.30.130:5432/kesplus-knowledge
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  data:
    redis:
      host: 152.136.30.130
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      table-underline: true
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

rag:
  max-segment-size: 1000
  max-retrieve-results: 5
  min-score: 0.6
  enable-graph-rag: true
  enable-self-rag: false
  enable-cache: true

  retriever:
    timeout-ms: 30000
    retry-count: 3
    batch-size: 100
    parallelism: 4

  embedding:
    model-type: huggingface
    base-url: https://api.siliconflow.cn/v1
    api-key: ${SILICONFLOW_API_KEY:}
    model-name: BAAI/bge-m3
    batch-size: 32
    embedding-dimension: 1024
    pooling: mean
    normalize: true

  llm:
    model-type: ollama
    base-url: http://localhost:11434
    model-name: qwen2
    timeout-ms: 60000
    temperature: 0.7
    max-tokens: 4096

  cache:
    ttl-minutes: 30
    max-size: 10000
    cache-type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.kes: DEBUG
    org.mybatis: DEBUG
    dev.langchain4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kesplus-knowledge-base.log
    max-size: 100MB
    max-history: 30
