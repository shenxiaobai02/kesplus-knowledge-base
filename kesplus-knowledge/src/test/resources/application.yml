server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: kesplus-knowledge-base
  datasource:
    url: jdbc:postgresql://152.136.30.130:5432/kesplus-knowledge?currentSchema=kesplus_knowledge_base&options=-c%20search_path=kesplus_knowledge_base,public
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-init-sql: SET search_path TO kesplus_knowledge_base, public
  data:
    redis:
      host: 152.136.30.130
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
  global-config:
    db-config:
      id-type: assign_id
      table-underline: true
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rag:
  max-segment-size: 1000
  max-retrieve-results: 5
  min-score: 0.6
  enable-graph-rag: false
  enable-self-rag: false
  enable-cache: false
  storage:
    path: ./data/uploads

  retriever:
    timeout-ms: 30000
    retry-count: 3
    batch-size: 100
    parallelism: 4

  embedding:
    model-type: huggingface
    base-url: https://api.siliconflow.cn/v1
    api-key: ${SILICONFLOW_API_KEY:sk-lmcyqeyyofuwrftczurmmsgskbllcdmlfteuavsnzrebktfj}
    model-name: BAAI/bge-m3
    batch-size: 32
    embedding-dimension: 1024
    pooling: mean
    normalize: true

  llm:
    model-type: ollama
    base-url: http://localhost:11434
    model-name: llama3.2:3b-instruct-q2_K
    timeout-ms: 60000
    temperature: 0.7
    max-tokens: 4096

  cache:
    ttl-minutes: 30
    max-size: 10000
    cache-type: caffeine

logging:
  level:
    root: INFO
    com.kes: DEBUG
    com.baomidou.mybatisplus: DEBUG
