server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: kesplus-knowledge-base

  datasource:
    url: jdbc:postgresql://152.136.30.130:5432/kesplus-knowledge?currentSchema=kesplus_knowledge_base
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  data:
    redis:
      host: 152.136.30.130
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      table-underline: true
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      schema: kesplus_knowledge_base
  mapper-locations: classpath:mapper/**/*.xml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

rag:
  max-segment-size: 1000
  max-retrieve-results: 5
  min-score: 0.6
  enable-graph-rag: true
  enable-self-rag: false
  enable-cache: true
  storage:
    path: ./data/uploads

  # 文档分割配置
  document:
    chunk-size: 1000          # 分片大小（字符数）
    chunk-overlap: 100        # 分片重叠大小（字符数）

  retriever:
    timeout-ms: 30000
    retry-count: 3
    batch-size: 100
    parallelism: 4

  embedding:
    model-type: huggingface
    base-url: https://api.siliconflow.cn/v1
    api-key: ${SILICONFLOW_API_KEY:sk-lmcyqeyyofuwrftczurmmsgskbllcdmlfteuavsnzrebktfj}
    model-name: BAAI/bge-m3
    batch-size: 32
    embedding-dimension: 1024
    pooling: mean
    normalize: true

  llm:
    model-type: ollama
    base-url: http://localhost:11434
    model-name: llama3.2:3b-instruct-q2_K
    timeout-ms: 60000
    temperature: 0.7
    max-tokens: 4096

  cache:
    ttl-minutes: 30
    max-size: 10000
    cache-type: caffeine

  # 图谱存储配置
  graph:
    storage-type: neo4j  # neo4j/postgresql
    # 关系权重配置
    relation:
      contains-weight: 1.0      # CONTAINS关系权重 - 文档包含段落关系，重要性最高
      keyword-weight: 0.5       # KEYWORD关系基础权重 - 段落提及关键词关系
      similar-weight: 0.3       # SIMILAR_TO关系基础权重 - 段落相似关系
    similarity-threshold: 0.2   # 相似关系相似度阈值 - 低于此阈值不创建相似关系
    keyword-limit: 8            # 关键词提取数量限制
    decay-factor: 0.8           # 相关节点分数衰减基础系数
    neo4j:
      uri: bolt://152.136.30.130:7687
      username: neo4j
      password: neo4j1234
      max-connection-pool-size: 50
      connection-acquisition-timeout: 60000

  # 重排序配置
  reranker:
    type: score  # score/llm
    vector-weight: 0.6
    graph-weight: 0.4

  # 查询增强配置
  query-enhancer:
    enabled: true                      # 是否启用查询增强
    enable-query-rewrite: true        # 是否启用查询改写
    enable-query-expansion: true       # 是否启用查询扩展
    enable-intent-recognition: true    # 是否启用意图识别
    structural-transform-enabled: true  # 是否启用结构化转换改写
    max-enhanced-queries: 3             # 最大增强查询数量
    self-rag-threshold: 70            # Self-RAG评分阈值
    conversation-context-enabled: true  # 是否启用多轮对话上下文管理
    conversation-context-ttl-minutes: 30  # 对话上下文TTL（分钟）

  # 指标配置
  metrics:
    enabled: true                     # 是否启用指标收集

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  health:
    redis:
      enabled: true
    db:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com:
      kes: INFO
    org:
      mybatis: INFO
    dev:
      langchain4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kesplus-knowledge-base.log
